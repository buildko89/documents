{% extends "base.html" %}

{% block extrahead %}
  <style>
    /* =========================================
       1. 全ページ共通の設定
       ========================================= */
    /* 左側のナビゲーション（インデックス）を全ページで非表示にする */
    .md-sidebar--primary {
      display: none !important;
    }

    /* メインコンテンツを正しく配置し、右側のTOCを右側に固定する */
    .md-content {
      margin-left: 0 !important; /* 左側の空白を詰める */
    }

    /* グリッドを調整してTOCを右端に維持 */
    .md-main__inner {
      display: flex !important;
      justify-content: flex-end !important; /* コンテンツとTOCを全体として右寄りに配置 */
    }

    .md-content {
      flex-grow: 1;
      max-width: 100% !important; /* 100%に広げる */
    }

    .md-sidebar--secondary {
      position: sticky !important;
      top: 3.2rem;
      width: 12.1rem;
      flex-shrink: 0; /* TOCの幅を維持 */
    }

    /* =========================================
       2. トップページ専用の設定
       ========================================= */
    {% if page and (page.is_homepage or page.file.src_path == "hakodoc/README.md") %}
    /* 特別の設定が必要な場合はここに記述 */
    {% endif %}
  </style>
{% endblock %}
